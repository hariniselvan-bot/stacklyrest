<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Header</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #eef1e6;
}

/* ================= HEADER ================= */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 80px;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  background: transparent;
  transition: 0.3s;
}

/* SCROLL */
.header.scrolled {
  background: darkslategray;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* LOGO */
.logo img {
  height: 60px;
  filter: brightness(0) saturate(100%) invert(74%) sepia(41%) saturate(620%) hue-rotate(6deg) brightness(95%) contrast(90%);
}

/* NAV */
.nav {
  display: flex;
  gap: 35px;
}

.nav a {
  text-decoration: none;
  color: #ffffff;
  font-size: 17px;
}

.nav a:hover,
.nav a.active {
  color: #D4AF37 ;
}

/* RIGHT */
.right {
    color: #fff;
  display: flex;
  align-items: center;
  gap: 25px;
}

/* ICON */
.icon {
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: #ffffff;
}

.icon:hover {
  color: #D4AF37;
}

/* BUTTON */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #D4AF37;
  color: #0d2b1f;
  padding: 12px 24px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.hamburger span {
  width: 25px;
  height: 3px;
  background: #000;
}

/* ================= MOBILE ================= */
.mobile-btn {
  display: none;
}

@media (max-width: 900px) {

  .header {
    padding: 15px 20px;
  }

  .nav {
    position: fixed;
    top: 70px;
    left: 0;
    width: 100%;
    background: darkslategray;
    flex-direction: column;
    align-items: center;
    display: none;
    padding: 25px;
  }

  .nav.active {
    display: flex;
  }

  .desktop-btn {
    display: none;
  }

  .mobile-btn {
    display: flex;
    width: 90%;
    justify-content: center;
    margin-top: 15px;
  }

  .icon span {
    display: none;
  }

  .hamburger {
    display: flex;
  }
}

</style>
</head>

<body>

<header class="header">

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.webp" alt="logo">
  </div>

  <!-- NAV -->
  <nav class="nav" id="navMenu">
    <a href="home.html">𝖧𝖮𝖬𝖤 +</a>
    <a href="about.html">𝙰𝙱𝙾𝚄𝚃 +</a>
    <a href="service.html">𝚂𝙴𝚁𝚅𝙸𝙲𝙴 +</a>
    <a href="page.html">𝙿𝙰𝙶𝙴𝚂 +</a>
    <a href="blog.html">𝙱𝙻𝙾𝙶 +</a>

    <!-- MOBILE BUTTON -->
    <a href="contact.html" class="btn mobile-btn">BOOK TABLE ↗</a>
  </nav>

  <!-- RIGHT -->
  <div class="right">
    <a href="#" class="icon"><i class="fa fa-search"></i><span>Search</span></a>

    <a href="login.html" class="icon" color="#D4AF37">
      <i class="fa fa-user"></i>
      <span>Login</span>
    </a>

    <!-- DESKTOP BUTTON -->
    <a href="contact.html" class="btn desktop-btn">BOOK TABLE ↗</a>

    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>

</header>

<script>

// MENU
const hamburger = document.getElementById("hamburger");
const nav = document.getElementById("navMenu");

hamburger.onclick = () => {
  nav.classList.toggle("active");
};

// SCROLL
window.addEventListener("scroll", () => {
  const header = document.querySelector(".header");

  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});

</script>
<section class="hdx-login-section">

    <div class="hdx-login-container">

        <!-- LEFT SIDE -->
        <div class="hdx-left">
            <div class="hdx-img-box">
                <img src="abt2.webp">
            </div>

            <h3 class="hdx-left-title">✦ LOGIN INFO ✦</h3>
            <p class="hdx-left-text">
                Access your account to explore exclusive features.
            </p>
        </div>

        <!-- DIVIDER -->
        <div class="hdx-divider"></div>

        <!-- RIGHT SIDE -->
        <div class="hdx-right">

            <h4 class="hdx-mini">✦ LOGIN ✦</h4>
            <h2 class="hdx-heading">Welcome Back</h2>

            <!-- ERROR -->
            <div id="hdx-error" class="hdx-error-msg"></div>

            <form id="hdxForm">

                <input type="text" id="name" placeholder="Your Name">
                <input type="email" id="email" placeholder="Your Email">
                <input type="password" id="password" placeholder="Password">

                <select id="role">
                    <option value="">Select Role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

                <!-- OPTIONS -->
                <div class="hdx-options">
                    <label class="hdx-remember">
                        <input type="checkbox">
                        <span>Remember Me</span>
                    </label>

                    <a href="404.html" class="hdx-forgot">Forgot Password?</a>
                </div>

                <button type="submit">LOGIN</button>

                <p class="hdx-signup">
                    Don't have an account? 
                    <a href="signup.html">Sign Up</a>
                </p>

            </form>

        </div>

    </div>

</section>

<style>
/* SECTION */
.hdx-login-section {
    background: #123d37;
    padding: 80px 0;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.hdx-login-container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    align-items: center;
    gap: 50px;
}

/* LEFT */
.hdx-left {
    width: 45%;
    text-align: center;
}

.hdx-img-box {
    max-width: 300px;
    margin: auto;
    border-radius: 50% 50% 0 0;
    overflow: hidden;
    border: 2px solid #e0b46a;
}

.hdx-img-box img {
    width: 100%;
}

.hdx-left-title {
    margin-top: 20px;
    color: #e0b46a;
}

.hdx-left-text {
    color: #ccc;
}

/* DIVIDER */
.hdx-divider {
    width: 2px;
    height: 420px;
    background: #e0b46a;
}

/* RIGHT */
.hdx-right {
    width: 55%;
}

.hdx-mini {
    color: #e0b46a;
    font-size: 12px;
}

.hdx-heading {
    font-size: 42px;
    margin-bottom: 20px;
}

/* ERROR */
.hdx-error-msg {
    color: #ff6b6b;
    margin-bottom: 10px;
    display: none;
}
/* FIX SELECT DROPDOWN */
form select {
    width: 100%;
    padding: 15px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    outline: none;
    appearance: none; /* 🔥 remove default style */
    -webkit-appearance: none;
    -moz-appearance: none;

    /* custom arrow */
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23e0b46a' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 16px;
}

/* OPTION FIX (limited but helps) */
form select option {
    background: #123d37;
    color: #fff;
}
form button {
    margin-top: 10px;
    letter-spacing: 1px;
    font-weight: 600;
}
.hdx-signup {
    margin-top: 18px;
    font-size: 15px;
}
/* INPUT */
form input, form select {
    width: 100%;
    padding: 15px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    outline: none;
    transition: 0.3s;
}

form input:focus, form select:focus {
    border-color: #e0b46a;
    box-shadow: 0 0 6px rgba(224,180,106,0.4);
}

/* ERROR INPUT */
.hdx-error {
    border: 1px solid #ff4d4d !important;
    box-shadow: 0 0 8px rgba(255,77,77,0.4);
}

/* OPTIONS */
.hdx-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 15px 0 20px;
}

.hdx-remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #ccc;
}

.hdx-remember input {
    accent-color: #e0b46a;
}

.hdx-forgot {
    color: #e0b46a;
    text-decoration: none;
    font-size: 13px;
}

.hdx-forgot:hover {
    text-decoration: underline;
}

/* BUTTON */
form button {
    width: 100%;
    padding: 15px;
    background: #e0b46a;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

form button:hover {
    background: #d4a85c;
}

/* SIGNUP */
.hdx-signup {
    text-align: center;
    margin-top: 15px;
    color: #ccc;
}

.hdx-signup a {
    color: #e0b46a;
    text-decoration: none;
}

.hdx-signup a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media(max-width:768px){
    .hdx-login-container {
        flex-direction: column;
    }

    .hdx-divider {
        display: none;
    }

    .hdx-left, .hdx-right {
        width: 100%;
    }
}
</style>

<script>
document.getElementById("hdxForm").addEventListener("submit", function(e){
    e.preventDefault();

    let inputs = document.querySelectorAll("#hdxForm input, #hdxForm select");
    let errorMsg = document.getElementById("hdx-error");

    let isValid = true;

    inputs.forEach(input => {
        if(input.value.trim() === ""){
            input.classList.add("hdx-error");
            isValid = false;
        } else {
            input.classList.remove("hdx-error");
        }
    });

    if(!isValid){
        errorMsg.style.display = "block";
        errorMsg.innerHTML = "⚠ Please fill all fields properly";
    } else {
        errorMsg.style.display = "none";

        let role = document.getElementById("role").value;

        if(role === "admin"){
            window.location.href = "admin.html";
        } else {
            window.location.href = "user.html";
        }
    }
});
</script>
